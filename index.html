<!DOCTYPE html>
<html>
<head>
    <title>EC2 Monitoring</title>
</head>
<body>
    <h1>EC2 Server Stats</h1>
    <pre id="data">Loading...</pre>

    <script>
        fetch("/api/stats")
            .then(res => res.json())
            .then(data => {
                document.getElementById("data").innerText =
                    JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById("data").innerText = "Error loading data";
            });
    </script>
</body>
</html>
