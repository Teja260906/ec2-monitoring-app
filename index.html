<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EC2 Advanced Monitoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .status {
      color: #22c55e;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 200px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .value {
      font-size: 20px;
      font-weight: bold;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

  <h1>🚀 EC2 Advanced Monitoring</h1>
  <div class="status">🟢 Server Online</div>

  <div class="container">
    <div class="card">
      <h3>CPU Cores</h3>
      <div id="cpu" class="value">-</div>
    </div>

    <div class="card">
      <h3>CPU Usage</h3>
      <div id="cpuUsage" class="value">-</div>
    </div>

    <div class="card">
      <h3>Platform</h3>
      <div id="platform" class="value">-</div>
    </div>

    <div class="card">
      <h3>Uptime</h3>
      <div id="uptime" class="value">-</div>
    </div>

    <div class="card">
      <h3>Memory</h3>
      <div id="memory" class="value">-</div>
    </div>

    <div class="card">
      <h3>Disk Usage</h3>
      <div id="disk" class="value">-</div>
    </div>
  </div>

  <button onclick="loadData()">🔄 Refresh</button>

  <script>
    function loadData() {
      fetch("/api/stats")
        .then(res => res.json())
        .then(data => {
          console.log(data);

          document.getElementById("cpu").innerText = data.cpuCores;
          document.getElementById("cpuUsage").innerText = data.cpuUsage + " %";
          document.getElementById("platform").innerText = data.platform;

          document.getElementById("uptime").innerText =
            Math.floor(data.uptime / 60) + " mins";

          document.getElementById("memory").innerText =
            data.memory.used + " / " + data.memory.total + " MB";

          // ✅ FIXED DISK DISPLAY
          if (data.disk && data.disk.used) {
            document.getElementById("disk").innerText =
              data.disk.used + " / " + data.disk.total + " (" + data.disk.usage + ")";
          } else {
            document.getElementById("disk").innerText = "No Data";
          }
        })
        .catch(err => {
          console.error("Error:", err);
        });
    }

    // auto refresh
    setInterval(loadData, 2000);
    loadData();
  </script>

</body>
</html>
