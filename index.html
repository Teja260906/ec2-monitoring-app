<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EC2 Advanced Monitoring</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .status {
      margin-bottom: 20px;
      font-weight: bold;
    }

    .online {
      color: #22c55e;
    }

    .offline {
      color: red;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 220px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    canvas {
      max-width: 800px;
      margin: auto;
    }
  </style>
</head>
<body>

<h1>🚀 EC2 Advanced Monitoring</h1>
<div id="status" class="status">Checking...</div>

<div class="container">
  <div class="card">Uptime: <span id="uptime">--</span></div>
  <div class="card">Platform: <span id="platform">--</span></div>
  <div class="card">CPU Cores: <span id="cpu">--</span></div>
  <div class="card">CPU Usage: <span id="cpuUsage">--</span></div>
  <div class="card">Memory: <span id="memory">--</span></div>
</div>

<canvas id="chart"></canvas>

<script>
let labels = [];
let cpuData = [];
let memData = [];

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [
      {
        label: 'CPU Usage (%)',
        data: cpuData,
        borderWidth: 2
      },
      {
        label: 'Memory Used (MB)',
        data: memData,
        borderWidth: 2
      }
    ]
  }
});

async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();

    // Status
    document.getElementById('status').innerText = "🟢 Server Online";
    document.getElementById('status').className = "status online";

    // Cards
    document.getElementById('uptime').innerText =
      Math.floor(data.uptime / 60) + " mins";

    document.getElementById('platform').innerText = data.platform;

    document.getElementById('cpu').innerText = data.cpuCores;

    document.getElementById('cpuUsage').innerText =
      data.cpuUsage + " %";

    document.getElementById('memory').innerText =
      `${data.memory.used} MB / ${data.memory.total} MB`;

    // Chart update
    const time = new Date().toLocaleTimeString();

    labels.push(time);
    cpuData.push(parseFloat(data.cpuUsage));
    memData.push(parseFloat(data.memory.used));

    if (labels.length > 10) {
      labels.shift();
      cpuData.shift();
      memData.shift();
    }

    chart.update();

  } catch (err) {
    document.getElementById('status').innerText = "🔴 Server Offline";
    document.getElementById('status').className = "status offline";
  }
}

// Refresh every 2 sec
setInterval(loadStats, 2000);
loadStats();
</script>

</body>
</html>
